name: Publish Binary Cache

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup signing key
        run: |
          if [[ -n "${{ secrets.NIX_SIGNING_KEY }}" ]]; then
            echo "${{ secrets.NIX_SIGNING_KEY }}" > "$RUNNER_TEMP/signing-key"
            echo "NIXCACHE_SIGNING_KEY_FILE=$RUNNER_TEMP/signing-key" >> "$GITHUB_ENV"
            echo ">>> Signing key configured"
          else
            echo ">>> No signing key configured — cache will be unsigned"
            echo "::notice::Cache packages will not be signed. Set NIX_SIGNING_KEY secret to enable signing. Clients will need require-sigs = false."
          fi

      - name: Update flake inputs
        run: |
          cd config
          nix flake update
          if git diff --quiet flake.lock 2>/dev/null; then
            echo ">>> No input changes"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add flake.lock
            git commit -m "config: update flake inputs"
            git push
            echo ">>> Committed updated flake.lock"
          fi

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and publish cache
        env:
          NIXCACHE_REPO: ${{ github.repository }}
          NIXCACHE_CONFIG_DIR: config
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          source lib/cache-builder.sh
          full_pipeline
